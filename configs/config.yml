paths:
  raw_dataset: "data/aggregated/dataset.csv"
  model: "artifacts/models/prediction_pipeline.joblib"
  logs: "logs"
  dashboard_artifacts: "artifacts/dashboard"

dashboard:
  github_url: "https://github.com/Nityunj-Goel/ipo-ml-decision-system"
  earliest_reporting_year: 2017   # older data pre-2017 is too sparse to be reliable

target:
  listing_gain_threshold_perc: 5

portfolio:
  trade_threshold: 0.40912833214795347

cv:
  n_splits: 5
  gap: 30
  holdout_fraction: 0.15

logistic_regression:
  C: 0.009061642080807474
  l1_ratio: 0.18264649920874743   # 0 < l1_ratio < 1 indicates elasticnet penalty
  solver: "saga"
  max_iter: 1000
  class_weight: "balanced"

lightgbm:
  n_estimators: 266
  learning_rate: 0.01188996214597206
  num_leaves: 58
  max_depth: 6
  min_child_samples: 13
  subsample: 0.8275336294975119
  colsample_bytree: 0.646361426224116
  reg_alpha: 0.00657760571422226
  reg_lambda: 0.002292584023916076